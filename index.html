<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hangul Typing Practice</title>
    <style>
        /* 여기서부터 디자인(CSS)입니다 */
        body {
            background-color: #f4f4f9; /* 연한 회색 배경 */
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #333;
        }
        .typing-area {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="typing-area">
        <h1>Lotus AI Intensive</h1>
        <p>주인님의 첫 번째 한글 타자 연습 서비스를 만드는 중입니다.</p>
    </div>
</body>
</html>
