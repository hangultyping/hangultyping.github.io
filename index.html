<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>타독타독 - Lotus AI Intensive</title>
    <style>
        body { background-color: #f4f4f9; font-family: 'Arial', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .typing-area { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 500px; }
        
        /* 로고와 서브타이틀을 묶어주는 래퍼 */
        .logo-wrapper {
            margin-bottom: 25px;
        }

        /* 로고 컨테이너 */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px; 
        }

        /* 서브타이틀 설명 디자인 */
        .subtitle {
            font-size: 13px;
            color: #777;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .keycap {
            display: inline-block;
            position: relative; 
            width: 36px;        
            height: 36px;       
            background-color: #fafafa;
            border: 2px solid #ddd;
            border-radius: 6px; 
            box-shadow: 2px 3px 0px #ccc; 
            margin: 0 17px; 
            user-select: none;
        }
        
        .keycap .kor {
            position: absolute;
            top: 2px;
            left: 6px;          
            font-size: 18px;    
            color: #555;
            font-weight: bold;
        }

        .keycap .eng {
            position: absolute;
            bottom: 2px;        
            right: 6px;         
            font-size: 10px;    
            color: #aaa; 
            font-weight: normal;
        }
        
        .key-left { transform: rotate(-12deg) translateY(5px); }
        .key-right { transform: rotate(15deg) translateY(-5px); }

        .logo-text { font-size: 38px; font-weight: 900; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .logo-text span { margin: 0 1px; }
        
        /* 💡 강조점(방점) 스타일 */
        .dot {
            -webkit-text-emphasis-style: dot;
            text-emphasis-style: dot;
            -webkit-text-emphasis-position: over;
            text-emphasis-position: over;
        }

        .char1 { color: #7CB342; display: inline-block; transform: rotate(-8deg) translateY(2px); } 
        .char2 { color: #2E7D32; display: inline-block; transform: rotate(5deg) translateY(-4px); } 
        .char3 { color: #1be04c; display: inline-block; transform: rotate(-5deg) translateY(4px); } 
        .char4 { color: #8BC34A; display: inline-block; transform: rotate(7deg) translateY(-2px); } 

        #target-text { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #333; }
        #typing-input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; outline: none; box-sizing: border-box; }
        .correct { color: green; }
        .incorrect { color: red; }
    </style>
</head>
<body>
    <div class="typing-area">
        
        <div class="logo-wrapper">
            <div class="logo-container">
                <div class="keycap key-left">
                    <span class="kor">ㄱ</span>
                    <span class="eng">R</span>
                </div>
                <h1 class="logo-text">
                    <!-- 💡 첫 번째 '타'와 '독'에 dot 클래스 추가 -->
                    <span class="char1 dot">타</span><span class="char2 dot">독</span><span class="char3 dot">타</span><span class="char4 dot">독</span>
                </h1>
                
                <div class="keycap key-right">
                    <span class="kor">ㅏ</span>
                    <span class="eng">K</span>
                </div>
            </div>
            <div class="subtitle">- <span class="dot">타</span>이핑하면서 정<span class="dot">독</span>하기 -</div>
        </div>

        <div id="target-text">안녕하세요?</div> 
        <input type="text" id="typing-input" placeholder="위 문장을 따라 입력하세요">
        <div id="display-area" style="margin-top: 20px; font-size: 20px;"></div>
        
        <p style="margin-top: 30px; font-size: 12px; color: #aaa;">Lotus AI Intensive Inc. © 2026</p>
    </div>

    <script>
        const targetText = "안녕하세요?"; 
        const input = document.getElementById('typing-input');
        const display = document.getElementById('display-area');

        input.addEventListener('input', () => {
            const val = input.value;
            display.innerHTML = ''; 

            for (let i = 0; i < val.length; i++) {
                const span = document.createElement('span');
                span.innerText = val[i];
                if (val[i] === targetText[i]) {
                    span.className = 'correct';
                } else {
                    span.className = 'incorrect';
                }
                display.appendChild(span);
            }
        });
    </script>
</body>
</html>
