<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hangul Typing Practice</title>
    <style>
        body {
            background-color: #f4f4f9;
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .typing-area {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 500px;
        }
        #display-area {
            border: 1px solid #ccc;
            padding: 15px;
            min-height: 50px;
            margin-top: 15px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="typing-area">
        <h1>Lotus AI Intensive</h1>
        <p>아래 상자를 클릭하고 글을 써보세요!</p>
        
        <input type="text" id="hidden-input" style="opacity: 0; position: absolute; z-index: -1;">
        
        <div id="display-area"></div>
    </div>

    <script>
        const input = document.getElementById('hidden-input');
        const display = document.getElementById('display-area');

        // 상자 클릭 시 입력창 활성화
        display.addEventListener('click', () => input.focus());

        // 입력 시 화면 반영
        input.addEventListener('input', () => {
            display.innerText = input.value;
        });
    </script>
</body>
</html>
