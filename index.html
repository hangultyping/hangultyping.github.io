<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hangul Typing Practice</title>
    <style>
        /* (기존 디자인은 그대로 두세요) */
        #display-area {
            font-size: 24px;
            margin-top: 20px;
            color: #555;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <div class="typing-area">
        <h1>Lotus AI Intensive</h1>
        <p>아래 상자를 클릭하고 글을 써보세요!</p>
        
        <input type="text" id="hidden-input" style="opacity: 0; position: absolute;">
        
        <div id="display-area" style="border: 1px solid #ccc; padding: 10px; min-height: 50px; cursor: pointer;">
        </div>
    </div>

    <script>
        const input = document.getElementById('hidden-input');
        const display = document.getElementById('display-area');

        // display 영역을 클릭하면 입력창에 포커스를 줍니다.
        display.addEventListener('click', () => input.focus());

        // 입력창에 글자가 입력될 때마다 화면에 반영합니다.
        input.addEventListener('input', (event) => {
            display.innerText = input.value;
        });
    </script>
</body>
