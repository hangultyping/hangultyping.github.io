<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hangul Typing Practice</title>
    <style>
        /* (기존 디자인은 그대로 두세요) */
        #display-area {
            font-size: 24px;
            margin-top: 20px;
            color: #555;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <div class="typing-area">
        <h1>Lotus AI Intensive</h1>
        <p>키보드를 두드려 보세요!</p>
        <div id="display-area"></div>
    </div>

    <script>
        // 키보드 입력을 감지하는 자바스크립트입니다.
        document.addEventListener('keydown', function(event) {
            const display = document.getElementById('display-area');
            // 사용자가 누른 키를 화면에 추가합니다.
            display.innerText += event.key;
        });
    </script>
</body>
</html>
